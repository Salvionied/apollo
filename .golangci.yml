version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  enable:
    - bodyclose
    - fatcontext
    - gosec
    - perfsprint
    - prealloc
  disable:
    - noctx
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - docs
      - third_party$
      - builtin$
      - examples$
    rules:
      # Weak-randomness and hardcoded-credential findings are acceptable in
      # test fixtures; production code is still fully checked.
      - path: _test\.go
        linters:
          - gosec
        text: "G(101|404)"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
